<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Orchestra Company Ecuador</title>
    <link rel="stylesheet" href="assets/css/Style.css">
    <link rel="stylesheet" href="assets/css/Contactanos.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo"><img src="assets/images/logo.jpg" alt="Orchestra Company Logo"></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Inicio</a></li>
                <li class="nav-item"><a href="Guitarras.html" class="nav-link">Guitarras</a></li>
                <li class="nav-item"><a href="Bajos.html" class="nav-link">Bajos</a></li>
                <li class="nav-item"><a href="Amplificadores.html" class="nav-link">Amplificadores</a></li>
                <li class="nav-item"><a href="Contactanos.html" class="nav-link">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <header class="page-header">
            <h1>Contacto</h1>
            <p>Escríbenos para asesoría personalizada en Fender Custom Shop.</p>
        </header>

        <section class="container">
            <div class="contact-wrapper">
                <form id="contactForm" class="contact-form">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre..." required>
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                    </div>

                    <div class="form-group">
                        <label for="mensaje">¿En qué podemos ayudarte?</label>
                        <textarea id="mensaje" name="mensaje" rows="5" placeholder="Cuéntanos sobre el instrumento que buscas..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Enviar Mensaje</button>
                    <div id="formResponse" class="form-message"></div>
                </form>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 Inspiración Fender Ecuador - Desde el año 2000 haciendo ruido.</p>
            <p>Visítanos en Guayaquil / Quito | Envíos a todo el país.</p>
        </footer>
    </main>

    <script src="main.js"></script>
</body>

</html>
